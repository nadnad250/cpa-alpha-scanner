name: AlphaForge Daily Review

on:
  schedule:
    # Tous les jours ouvrés à 21h UTC (après clôture US)
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dirs
        run: mkdir -p data/cache data/signals data/reports

      - name: Run daily review
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_review.py

      - name: Commit updated signals
        run: |
          git config user.name "alphaforge-bot"
          git config user.email "bot@alphaforge.local"
          git add data/signals/ || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: daily signal evaluation $(date -u +%Y-%m-%d)"
          git push || echo "nothing to push"
