name: AlphaForge Bot

on:
  schedule:
    # Heures NY : 09:30, 11:00, 13:30, 15:30 (UTC : 13:30, 15:00, 17:30, 19:30)
    - cron: "30 13,17,19 * * 1-5"
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "once"
        type: choice
        options:
          - once
          - demo

permissions:
  contents: write   # nécessaire pour commit signals.json

# Empêche 2 bot runs de tourner en même temps (évite conflits push)
concurrency:
  group: alphaforge-bot
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dirs
        run: mkdir -p data/cache data/reports data/signals dashboard/data

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RISK_FREE_RATE: "0.045"
          DASHBOARD_PATH: "./dashboard/data/signals.json"
          MODE: ${{ github.event.inputs.mode || 'once' }}
        run: |
          if [ "$MODE" = "demo" ]; then
            python bot_loop.py --once --demo
          else
            python bot_loop.py --once
          fi

      - name: Commit dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Sauvegarder nos fichiers fraîchement générés
          cp dashboard/data/signals.json /tmp/signals_fresh.json 2>/dev/null || true
          mkdir -p /tmp/signals_fresh && cp -r data/signals/* /tmp/signals_fresh/ 2>/dev/null || true

          git add dashboard/data/signals.json data/signals/ || true
          if git diff --staged --quiet; then
            echo "Pas de changement à committer"
          else
            git commit -m "chore(bot): update signals $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Push robuste : en cas de collision, reset + restore + replay
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Push réussi tentative $i"
                break
              fi
              echo "Collision détectée ($i/5) — fetch + reset + replay nos fichiers"
              git fetch origin master
              git reset --hard origin/master
              # Restaurer nos fichiers fraîchement générés (écrase remote pour ces fichiers)
              cp /tmp/signals_fresh.json dashboard/data/signals.json 2>/dev/null || true
              cp -r /tmp/signals_fresh/* data/signals/ 2>/dev/null || true
              git add dashboard/data/signals.json data/signals/ || true
              if git diff --staged --quiet; then
                echo "Pas de différence après reset — le remote a déjà nos données"
                break
              fi
              git commit -m "chore(bot): update signals $(date -u +'%Y-%m-%d %H:%M UTC') [retry $i]"
              sleep 2
            done
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: data/reports/
          retention-days: 30
