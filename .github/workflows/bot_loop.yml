name: AlphaForge Bot

on:
  schedule:
    - cron: "0 6,10,14,18 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "once"
        type: choice
        options:
          - once
          - demo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dirs
        run: mkdir -p data/cache data/reports

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RISK_FREE_RATE: "0.045"
          MODE: ${{ github.event.inputs.mode || 'once' }}
        run: |
          if [ "$MODE" = "demo" ]; then
            python bot_loop.py --once --demo
          else
            python bot_loop.py --once
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: data/reports/
          retention-days: 30

# trigger
