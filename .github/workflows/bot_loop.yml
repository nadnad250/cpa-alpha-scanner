name: AlphaForge Bot

on:
  schedule:
    # Mode INTRADAY AGRESSIF — scans plus fréquents pour capter mouvements 24h
    # Heures NY (UTC) : 09:35 (13:35), 11:00 (15:00), 12:30 (16:30),
    #                   14:00 (18:00), 15:30 (19:30)
    - cron: "35 13 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "30 16 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "30 19 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "once"
        type: choice
        options:
          - once
          - demo

permissions:
  contents: write   # nécessaire pour commit signals.json

# Empêche 2 bot runs de tourner en même temps (évite conflits push)
concurrency:
  group: alphaforge-bot
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dirs
        run: mkdir -p data/cache data/reports data/signals dashboard/data

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RISK_FREE_RATE: "0.045"
          DASHBOARD_PATH: "./dashboard/data/signals.json"
          MODE: ${{ github.event.inputs.mode || 'once' }}
        run: |
          if [ "$MODE" = "demo" ]; then
            python bot_loop.py --once --demo
          else
            python bot_loop.py --once
          fi

      - name: Commit dashboard data
        id: commit_step
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp dashboard/data/signals.json /tmp/signals_fresh.json 2>/dev/null || true
          mkdir -p /tmp/signals_fresh && cp -r data/signals/* /tmp/signals_fresh/ 2>/dev/null || true

          # Snapshot du state Telegram pour pouvoir le restaurer après collision
          cp data/telegram_state.json /tmp/telegram_state_fresh.json 2>/dev/null || true

          git add dashboard/data/signals.json data/signals/ data/telegram_state.json || true
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Pas de changement à committer"
          else
            git commit -m "chore(bot): update signals $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Push réussi tentative $i"
                echo "changed=true" >> $GITHUB_OUTPUT
                break
              fi
              echo "Collision détectée ($i/5)"
              git fetch origin master
              git reset --hard origin/master
              cp /tmp/signals_fresh.json dashboard/data/signals.json 2>/dev/null || true
              cp -r /tmp/signals_fresh/* data/signals/ 2>/dev/null || true
              cp /tmp/telegram_state_fresh.json data/telegram_state.json 2>/dev/null || true
              git add dashboard/data/signals.json data/signals/ data/telegram_state.json || true
              if git diff --staged --quiet; then
                echo "changed=false" >> $GITHUB_OUTPUT
                break
              fi
              git commit -m "chore(bot): update signals $(date -u +'%Y-%m-%d %H:%M UTC') [retry $i]"
              sleep 2
            done
          fi

      # GITHUB_TOKEN ne déclenche pas les workflows auto → force Pages deploy
      - name: Trigger Pages deploy
        if: steps.commit_step.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages.yml --ref master || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: data/reports/
          retention-days: 30
