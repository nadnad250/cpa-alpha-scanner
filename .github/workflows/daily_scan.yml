name: CPA Alpha Scanner — Scan Quotidien

on:
  # Tous les jours ouvrés à 7h30 UTC (9h30 Paris, juste avant ouverture EU)
  schedule:
    - cron: "30 7 * * 1-5"

  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "once"
        type: choice
        options:
          - once
          - demo

permissions:
  contents: write

# Empêche les collisions avec bot_loop.yml
concurrency:
  group: alphaforge-bot
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dirs
        run: mkdir -p data/cache data/reports data/signals dashboard/data

      - name: Run bot (avec export dashboard)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RISK_FREE_RATE: "0.045"
          DASHBOARD_PATH: "./dashboard/data/signals.json"
          MODE: ${{ github.event.inputs.mode || 'once' }}
        run: |
          if [ "$MODE" = "demo" ]; then
            python bot_loop.py --once --demo
          else
            python bot_loop.py --once
          fi

      - name: Commit dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp dashboard/data/signals.json /tmp/signals_fresh.json 2>/dev/null || true
          mkdir -p /tmp/signals_fresh && cp -r data/signals/* /tmp/signals_fresh/ 2>/dev/null || true

          git add dashboard/data/signals.json data/signals/ || true
          if git diff --staged --quiet; then
            echo "Pas de changement à committer"
          else
            git commit -m "chore(bot): update signals $(date -u +'%Y-%m-%d %H:%M UTC') [daily_scan]"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Push réussi tentative $i"
                break
              fi
              echo "Collision ($i/5) — reset hard + restore + replay"
              git fetch origin master
              git reset --hard origin/master
              cp /tmp/signals_fresh.json dashboard/data/signals.json 2>/dev/null || true
              cp -r /tmp/signals_fresh/* data/signals/ 2>/dev/null || true
              git add dashboard/data/signals.json data/signals/ || true
              if git diff --staged --quiet; then
                echo "Remote contient déjà nos données"
                break
              fi
              git commit -m "chore(bot): update signals $(date -u +'%Y-%m-%d %H:%M UTC') [daily_scan retry $i]"
              sleep 2
            done
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: data/reports/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token = os.getenv('TELEGRAM_BOT_TOKEN')
          chat_id = os.getenv('TELEGRAM_CHAT_ID')
          if token and chat_id:
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={
                      'chat_id': chat_id,
                      'text': '⛔ <b>CPA Scanner FAILED</b>\nRun: ${{ github.run_number }}\nCheck GitHub Actions logs.',
                      'parse_mode': 'HTML'
                  }
              )
          "
